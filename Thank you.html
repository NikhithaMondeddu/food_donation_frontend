<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5 url('food6.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thank-container {
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      max-width: 500px;
      width: 90%;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h1 {
      color: #2c8b4c;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }

    a.button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #2c8b4c;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #246f3d;
    }
  </style>
</head>
<body>

  <div class="thank-container">
    <h1>Thank You!</h1>
    <p>Your food donation is greatly appreciated.<br>You've made a difference today!</p>
    <a href="index.html" class="button">Back to Home</a>
  </div>

</body>
</html>
